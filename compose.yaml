x-app: &app
  build:
    context: .
    dockerfile: UrlShortner/Dockerfile
  image: urlshortner
  environment:
    - CASSANDRA_HOST=cassandra
    - ConnectionStrings__Redis=redis:6379
  depends_on:
    cassandra:
      condition: service_healthy
    redis:
      condition: service_started

services:
  cassandra:
    image: cassandra:5
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12

  redis:
    image: redis:7

  app1:
    <<: *app
  app2:
    <<: *app
  app3:
    <<: *app

  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
